# yaml-language-server: $schema=https://moonrepo.dev/schemas/toolchain.json
#
# Toolchain versions are sourced from .prototools at the repo root so moon, proto
# and CI all agree. Keep `version` fields here aligned with .prototools.

node:
  version: "22.16.0"
  packageManager: "pnpm"
  pnpm:
    version: "10.11.0"
  # Dedupe and sync workspace deps automatically.
  dedupeOnLockfileChange: true
  inferTasksFromScripts: false

python:
  version: "3.13.3"
  packageManager: "uv"
  uv:
    version: "0.7.8"
