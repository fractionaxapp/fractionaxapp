# yaml-language-server: $schema=https://moonrepo.dev/schemas/tasks.json
#
# Default tasks inherited by all Node/TypeScript projects (apps, services, packages).
# Projects override or extend these in their own moon.yml.

tasks:
  build:
    command: "tsc --build"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    outputs:
      - "dist"

  dev:
    command: "noop"
    local: true
    options:
      cache: false
      persistent: true

  test:
    command: "vitest run"
    inputs:
      - "@group(sources)"
      - "@group(tests)"

  lint:
    command: "eslint ."
    inputs:
      - "@group(sources)"
      - "@group(configs)"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
