# yaml-language-server: $schema=https://moonrepo.dev/schemas/tasks.json
#
# Default tasks inherited by all Python projects (services, ai, libs). Uses uv for
# environment management and ruff/pytest/mypy for the standard quality gates.

tasks:
  install:
    command: "uv sync"
    inputs:
      - "pyproject.toml"
      - "uv.lock"

  dev:
    command: "noop"
    local: true
    options:
      cache: false
      persistent: true

  test:
    command: "uv run pytest"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "pyproject.toml"

  lint:
    command: "uv run ruff check ."
    inputs:
      - "@group(sources)"
      - "pyproject.toml"

  format:
    command: "uv run ruff format ."
    inputs:
      - "@group(sources)"

  typecheck:
    command: "uv run mypy src"
    inputs:
      - "@group(sources)"
      - "pyproject.toml"
