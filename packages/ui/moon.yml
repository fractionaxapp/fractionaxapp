# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: "library"
language: "typescript"
stack: "frontend"
tags: ["shared", "ts", "ui", "react"]
toolchains:
  default: ["node"]
project:
  name: "ui"
  description: "Shared React component library."
dependsOn:
  - "core"

fileGroups:
  sources:
    - "src/**/*"

tasks:
  build:
    command: "pnpm exec tsc --build"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    outputs:
      - "dist"
  lint:
    command: "pnpm exec eslint ."
    inputs:
      - "@group(sources)"
      - "eslint.config.js"
  typecheck:
    command: "pnpm exec tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
