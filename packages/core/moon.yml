# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: "library"
language: "typescript"
stack: "infrastructure"
tags: ["shared", "ts", "ts-library"]
toolchains:
  default: ["node"]
project:
  name: "core"
  description: "Shared TypeScript utilities, types and business primitives."

fileGroups:
  sources:
    - "src/**/*"
  tests:
    - "src/**/*.test.ts"

# Tasks run local binaries through `pnpm exec` so they resolve from the workspace
# node_modules regardless of the active moon toolchain.
tasks:
  build:
    command: "pnpm exec tsc --build"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    outputs:
      - "dist"
  test:
    command: "pnpm exec vitest run"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "/test-fixtures/money-cases.json"
  lint:
    command: "pnpm exec eslint ."
    inputs:
      - "@group(sources)"
      - "eslint.config.js"
  typecheck:
    command: "pnpm exec tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
