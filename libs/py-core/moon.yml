# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: "library"
language: "python"
stack: "infrastructure"
tags: ["shared", "py", "py-library"]
toolchains:
  default: ["python"]
project:
  name: "py-core"
  description: "Shared Python utilities and domain primitives."

fileGroups:
  sources:
    - "src/**/*"
  tests:
    - "tests/**/*"

# uv manages the virtualenv, so tasks are toolchain-agnostic.
tasks:
  install:
    command: "uv sync --all-extras"
    inputs:
      - "pyproject.toml"
  test:
    command: "uv run pytest"
    deps:
      - "~:install"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "pyproject.toml"
      - "/test-fixtures/money-cases.json"
  lint:
    command: "uv run ruff check ."
    deps:
      - "~:install"
    inputs:
      - "@group(sources)"
      - "pyproject.toml"
  format:
    command: "uv run ruff format --check ."
    deps:
      - "~:install"
    inputs:
      - "@group(sources)"
  typecheck:
    command: "uv run mypy src"
    deps:
      - "~:install"
    inputs:
      - "@group(sources)"
      - "pyproject.toml"
