name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, test (affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so moon can diff against the base for affected-project
          # detection. Submodules are intentionally NOT fetched: this CI validates
          # the in-repo packages only, and each submodule runs its own CI. moon
          # ignores uninitialised submodule directories.
          fetch-depth: 0

      - name: Install proto (toolchain manager)
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0
        with:
          auto-install: true

      # Shared cache across runs: moon's task cache plus the pnpm/uv download stores.
      # (For true cross-machine moon remote caching, configure `unstable_remote` in
      # .moon/workspace.yml against a cache backend + secret.)
      - name: Restore moon and dependency caches
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .moon/cache
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: ci-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'libs/py-core/uv.lock') }}
          restore-keys: |
            ci-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check affected projects
        env:
          EVENT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          MOON_HEAD: ${{ github.sha }}
        run: |
          base="$EVENT_BASE"
          # A force-push (history rewrite) or new branch can leave the base SHA
          # unreachable; moon's affected-detection then dies on `bad object`.
          # Fall back to HEAD~1 (or no base) so CI stays robust.
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "Base '$base' is unavailable — falling back to HEAD~1."
            base="$(git rev-parse --verify --quiet HEAD~1 || true)"
          fi
          if [ -n "$base" ]; then
            MOON_BASE="$base" moon ci --color
          else
            moon ci --color
          fi
