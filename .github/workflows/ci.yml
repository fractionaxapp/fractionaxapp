name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, test (affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so moon can diff against the base for affected-project
          # detection. Submodules are intentionally NOT fetched: this CI validates
          # the in-repo packages only, and each submodule runs its own CI. moon
          # ignores uninitialised submodule directories.
          fetch-depth: 0

      - name: Install proto (toolchain manager)
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      # Shared cache across runs: moon's task cache plus the pnpm/uv download stores.
      # (For true cross-machine moon remote caching, configure `unstable_remote` in
      # .moon/workspace.yml against a cache backend + secret.)
      - name: Restore moon and dependency caches
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: ci-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'libs/py-core/uv.lock') }}
          restore-keys: |
            ci-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check affected projects
        run: moon ci --color
        env:
          MOON_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          MOON_HEAD: ${{ github.sha }}
